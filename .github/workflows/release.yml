name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

env:
  JAVA_VERSION: '21'
  VERSION_FILE: gradle/libs.versions.toml

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PRIVATE_ACCESS_TOKEN }}
          ref: main

      - name: Compute version values
        shell: bash
        run: |
          TAG_VER=${{ github.ref_name }}
          version="${TAG_VER#v}"
          echo "VERSION=$version" >> $GITHUB_ENV

          current_code=$(grep -E '^projectVersionCode =' "$VERSION_FILE" | sed -E 's/[^0-9]*//g')
          version_code=$((current_code + 1))
          echo "VERSION_CODE=$version_code" >> $GITHUB_ENV

          echo "New Version : $version"
          echo "New Code    : $version_code"

      - name: Write version into file
        shell: bash
        run: |
          sed -i "s/^projectVersion = \".*\"/projectVersion = \"$VERSION\"/" "$VERSION_FILE"
          sed -i "s/^projectVersionCode = \".*\"/projectVersionCode = \"$VERSION_CODE\"/" "$VERSION_FILE"

      - name: Commit & push version bump
        shell: bash
        run: |
          git config user.name  "ci bot"
          git config user.email "ci@local"
          git add "$VERSION_FILE"
          git commit -m "bump version to $VERSION"
          git push origin HEAD:main

  create-release:
    runs-on: ubuntu-latest
    needs: update-version
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Release ${{ github.ref_name }}"

  # ------------------------------------------ Desktop ---------------------------------------------------

  desktop:
    name: Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.runs-on }}
    needs: create-release

    strategy:
      matrix:
        include:
          - platform: linux-debian
            runs-on: ubuntu-latest
            targets: ["Deb", "AppImage"]
          # no runners atm
          # - platform: windows
          #   runs-on: windows-latest
          #   targets: ["Msi"]
          # - platform: macos
          #   runs-on: macos-latest
          #   targets: ["Dmg"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      # libfuse2  for   AppImage runtime
      # fakeroot  for   Deb packaging
      - name: Install packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2 fakeroot

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set VERSION env
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Build all targets
        run: |
          targets='${{ toJson(matrix.targets) }}'
          echo "Building targets: $targets"
          for target in $(echo "$targets" | jq -r '.[]'); do
            echo "→ packageRelease$target"
            ./gradlew :desktopApp:packageRelease$target --stacktrace
          done

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staging
          version="${VERSION#v}"

          for dir in desktopApp/build/compose/binaries/main-release/*/; do
            dirname=$(basename "$dir")
            files=("$dir"*)

            if [[ ${#files[@]} -eq 1 && -f "${files[0]}" ]]; then
              ext="${files[0]##*.}"
              dest="staging/ebuecherregal-${version}.${ext}"
              echo "Staging single file: ${files[0]} → $dest"
              cp "${files[0]}" "$dest"
            else
              dest="staging/ebuecherregal-${version}.${dirname}.tar.gz"
              echo "Staging directory as tarball: $dir → $dest"
              tar -czvf "$dest" -C "$dir" .
            fi
          done

          echo "Staged files:"
          ls -lh staging/

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_ACCESS_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" staging/* \
            --repo "${{ github.repository }}" \
            --clobber

  # -------------------------------------------- Android ---------------------------------------------

  android:
    name: Android Release
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set VERSION env
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > androidApp/keystore.jks
          chmod 600 androidApp/keystore.jks

      - name: Build AAB & APK
        env:
          ANDROID_KEYSTORE_PATH: keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
          ANDROID_KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
        run: ./gradlew :androidApp:bundleRelease :androidApp:assembleRelease --stacktrace

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staging
          version="${VERSION#v}"
          cp androidApp/build/outputs/apk/release/*.apk    "staging/ebuecherregal-${version}.apk"
          cp androidApp/build/outputs/bundle/release/*.aab "staging/ebuecherregal-${version}.aab"
          ls -lh staging/

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" staging/* \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Cleanup keystore
        if: always()
        run: rm -f androidApp/keystore.jks
